# golangci-lint configuration
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true

linters:
  enable:
    # Core linters
    - errcheck      # Check for unchecked errors
    - govet         # Reports suspicious constructs
    - staticcheck   # Static analysis checks
    - revive        # Fast, configurable linter (drop-in for golint)
    
    # Additional recommended linters
    - gosimple      # Simplify code
    - gofmt         # Whether code was gofmt-ed
    - goimports     # Check import statements
    - misspell      # Finds commonly misspelled English words
    - unconvert     # Detects unnecessary type conversions
    - unparam       # Reports unused function parameters
    
  disable:
    - deadcode      # Deprecated, use staticcheck
    - varcheck      # Deprecated, use unparam
    - interfacer     # Deprecated

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  
  govet:
    enable-all: true
    disable:
      - fieldalignment
  
  staticcheck:
    checks:
      - all
  
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
  
  goimports:
    local-prefixes: github.com/esanchezm/terradrift

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 10
